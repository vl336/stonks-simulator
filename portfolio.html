<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>StonksSimulator - Портфель</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/portfolio.css">
</head>
<body>

<div id="header-mount"></div>

<div class="container">
  <h1>Мой портфель</h1>
  <div id="portfolio-root"></div>
</div>

<script src="js/utils.js"></script>
<script src="js/components.js"></script>
<script src="js/moex.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById('header-mount').outerHTML = renderHeader('portfolio');

  const moex = new MoexClient();

  // ── Форматирование ─────────────────────────────────────────────────────────
  // fmtRub, fmtPct, fmtDate — из utils.js

  // ── Рендер ─────────────────────────────────────────────────────────────────
  function renderSummary(balance, portfolioValue, pnl, totalAssets) {
    const pnlClass = pnl >= 0 ? 'green' : 'red';
    const pnlSign  = pnl >= 0 ? '+' : '';
    const pnlPct   = portfolioValue > 0
      ? fmtPct((pnl / (portfolioValue - pnl)) * 100)
      : '0.00%';

    return `
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">Свободные средства</div>
          <div class="summary-value">${fmtRub(balance)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Стоимость акций</div>
          <div class="summary-value">${fmtRub(portfolioValue)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Итого активов</div>
          <div class="summary-value">${fmtRub(totalAssets)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Прибыль / Убыток</div>
          <div class="summary-value ${pnlClass}">${pnlSign}${fmtRub(pnl)}</div>
          <div class="summary-sub ${pnlClass}">${pnlSign}${pnlPct}</div>
        </div>
      </div>`;
  }

  function renderPositions(positions) {
    if (!positions.length) {
      return `
        <h2>Открытые позиции</h2>
        <div class="table-wrap">
          <table><tbody>
            <tr><td class="td-empty">У вас пока нет акций. <a href="market.html">Перейти на рынок →</a></td></tr>
          </tbody></table>
        </div>`;
    }

    const rows = positions.map(p => {
      const pnlClass = p.pnl >= 0 ? 'green' : 'red';
      const pnlSign  = p.pnl >= 0 ? '+' : '';
      return `
        <tr>
          <td class="ticker-cell">
            <strong>${p.name}</strong>
            <span>${p.ticker}</span>
          </td>
          <td class="right">${p.quantity} шт.</td>
          <td class="right">${fmtRub(p.avg_buy_price)}</td>
          <td class="right">${fmtRub(p.currentPrice)}</td>
          <td class="right">${fmtRub(p.currentValue)}</td>
          <td class="right ${pnlClass}">${pnlSign}${fmtRub(p.pnl)}</td>
          <td class="right ${pnlClass}">${pnlSign}${p.pnlPct.toFixed(2)}%</td>
          <td>
            <div class="btn-group">
              <button class="btn-sm btn-buy"  onclick="location.href='trade.html?ticker=${p.ticker}&mode=buy'">Купить</button>
              <button class="btn-sm btn-sell" onclick="location.href='trade.html?ticker=${p.ticker}&mode=sell'">Продать</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    return `
      <h2>Открытые позиции</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Компания</th>
              <th class="right">Кол-во</th>
              <th class="right">Ср. цена</th>
              <th class="right">Тек. цена</th>
              <th class="right">Стоимость</th>
              <th class="right">P&amp;L ₽</th>
              <th class="right">P&amp;L %</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderTransactions(txs) {
    if (!txs.length) {
      return `
        <h2>История сделок</h2>
        <div class="table-wrap">
          <table><tbody>
            <tr><td class="td-empty">Сделок пока не было</td></tr>
          </tbody></table>
        </div>`;
    }

    const rows = txs.map(t => {
      const typeLabel = t.type === 'buy' ? 'Покупка' : 'Продажа';
      const typeClass = t.type === 'buy' ? 'badge-buy' : 'badge-sell';
      return `
        <tr>
          <td class="muted">${fmtDate(t.created_at)}</td>
          <td><strong>${t.ticker}</strong></td>
          <td class="${typeClass}">${typeLabel}</td>
          <td class="right">${t.quantity} шт.</td>
          <td class="right">${fmtRub(parseFloat(t.price))}</td>
          <td class="right">${fmtRub(parseFloat(t.total_amount))}</td>
        </tr>`;
    }).join('');

    return `
      <h2>История сделок</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Тикер</th>
              <th>Тип</th>
              <th class="right">Кол-во</th>
              <th class="right">Цена</th>
              <th class="right">Сумма</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function showLoading() {
    document.getElementById('portfolio-root').innerHTML = `
      <div class="table-wrap">
        <table><tbody>
          <tr><td class="td-loading">Загрузка...</td></tr>
        </tbody></table>
      </div>`;
  }

  // ── Загрузка данных ────────────────────────────────────────────────────────
  document.addEventListener('app:userReady', loadPortfolio);
  document.addEventListener('app:userLogout', () =>
    showLoginPrompt('portfolio-root', 'Войдите в аккаунт, чтобы увидеть свой портфель')
  );

  async function loadPortfolio() {
    if (!window.supabase) return;

    const user = await window.supabase.auth.getUser();
    if (!user) {
      showLoginPrompt('portfolio-root', 'Войдите в аккаунт, чтобы увидеть свой портфель');
      return;
    }

    showLoading();

    try {
      const [posRes, txRes, profRes, moexRes] = await Promise.allSettled([
        api.getPortfolio(),
        api.getTransactions(20),
        api.getProfile(),
        moex.getAllStocks(),
      ]);

      if (posRes.status === 'rejected') throw posRes.reason;
      if (txRes.status  === 'rejected') throw txRes.reason;
      if (profRes.status === 'rejected') throw profRes.reason;

      const positions     = posRes.value || [];
      const transactions  = txRes.value  || [];
      const profile       = profRes.value;

      // Карта текущих цен и названий из MOEX (необязательно — если MOEX недоступен, покажем без цен)
      let stockMap = new Map();
      if (moexRes.status === 'fulfilled') {
        const moexData = moexRes.value;
        stockMap = new Map(
          moex.merge(moexData.securities, moexData.marketdata).map(s => [s.SECID, s])
        );
      } else {
        console.error('MOEX unavailable:', moexRes.reason);
      }

      // Обогащаем позиции текущими ценами
      const enriched = positions.map(p => {
        const stock        = stockMap.get(p.ticker);
        const currentPrice = stock?.LAST || parseFloat(p.avg_buy_price);
        const avgPrice     = parseFloat(p.avg_buy_price);
        const currentValue = currentPrice * p.quantity;
        const costBasis    = avgPrice * p.quantity;
        const pnl          = currentValue - costBasis;
        const pnlPct       = costBasis > 0 ? (pnl / costBasis) * 100 : 0;
        return { ...p, name: stock?.SHORTNAME || p.ticker, currentPrice, currentValue, pnl, pnlPct };
      });

      const balance        = parseFloat(profile?.balance || 0);
      const portfolioValue = enriched.reduce((s, p) => s + p.currentValue, 0);
      const totalPnl       = enriched.reduce((s, p) => s + p.pnl, 0);
      const totalAssets    = balance + portfolioValue;

      document.getElementById('portfolio-root').innerHTML =
        renderSummary(balance, portfolioValue, totalPnl, totalAssets) +
        renderPositions(enriched) +
        renderTransactions(transactions);

    } catch (e) {
      document.getElementById('portfolio-root').innerHTML =
        '<div class="table-wrap"><table><tbody><tr><td class="td-empty">Ошибка загрузки данных</td></tr></tbody></table></div>';
      console.error(e);
    }
  }
</script>

<script type="module" src="js/auth.js"></script>

</body>
</html>
